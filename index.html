<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIS - Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-card">
        <div class="login-logo">UIS</div>
        <div class="login-subtitle">Universidad de Ingeniería y Software</div>
        
        <div id="mensajeError" class="error-alert">
            <i class="fa-solid fa-circle-exclamation"></i> Sesión Incorrecta
        </div>

        <form id="loginForm" onsubmit="validarAcceso(event)">
            <div class="form-group">
                <label for="usuario">Identificación o Correo</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="usuario" placeholder="Ej: admin@uis.edu.co" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <div class="forgot-password-wrapper">
                <a href="#" onclick="abrirModal(event)">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-btn">Ingresar al Sistema</button>
        </form>

        <div class="login-footer">
            <p>© 2026 UIS - Sistema Académico Integral</p>
        </div>
    </div> <div id="modalRecuperar" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <h3>Recuperar Contraseña</h3>
            <p>Introduce tu correo institucional para enviarte las instrucciones de recuperación.</p>
            
            <form onsubmit="enviarRecuperacion(event)">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="correoRecuperar" placeholder="Ej: estudiante@uis.edu.co" required>
                    </div>
                </div>
                <button type="submit" class="modal-btn">Enviar Correo</button>
            </form>
        </div>
    </div>

    <script src="login.js"></script>

</body>
</html>
